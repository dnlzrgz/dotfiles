setw -g mouse on
set -g history-limit 10000

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'catppuccin/tmux'
set -g @plugin 'tmux-plugins/tmux-sensible'

# Colorscheme
set -g @catppuccin_flavour 'frappe'
set -g default-terminal "screen-256color"

# Panes
unbind v
unbind h

bind c new-window -c "#{pane_current_path}"
bind '"' split-window -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"

bind v split-window -h -c "#{pane_current_path}"
bind h split-window -v -c "#{pane_current_path}"

# Navigating panes
bind -n C-h select-pane -L # Ctrl + h
bind -n C-j select-pane -D # Ctrl + j
bind -n C-k select-pane -U # Ctrl + k
bind -n C-l select-pane -R # Ctrl + l

# Windows
unbind n  # Default key: Move to next window
unbind w  # Default key: change current window interactively

bind n command-prompt "rename-window '%%'" # Rename current window
bind w new-window - c "#{pane_current_path}" # Creates a new window

set -g base-index 1
set-window-option -g pane-base-index 1

# Reload config
unbind r
bind r source-file ~/.tmux.conf \; display "Reloaded ~/.tmux.conf"

# Initialize tmux plugin manager.
run '~/.tmux/plugins/tpm/tpm'
